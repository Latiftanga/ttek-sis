services:

  # ── Database ────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: ttek_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ttek_net

  # ── Cache / Sessions ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ttek_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ttek_net

  # ── FastAPI Backend ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ttek_backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000" 
    volumes:
      - ./backend:/app        # live reload — code changes reflect instantly
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ttek_net

  # ── Next.js Frontend ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ttek_frontend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./frontend/src:/app/src    # live reload
    depends_on:
      - backend
    networks:
      - ttek_net

  # ── Nginx Reverse Proxy ───────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ttek_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - ttek_net

# ── Named volumes (data survives container restarts) ───────────────
volumes:
  postgres_data:
  redis_data:

# ── Internal network (services talk to each other by name) ─────────
networks:
  ttek_net:
    driver: bridge